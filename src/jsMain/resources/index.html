<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e27" />
    <title>Connect Four</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    />
    <style>
        :root,
        :root[data-theme="dark"] {
            --bg-top: #1e1b4b;
            --bg-bottom: #0a0e27;
            --bg-glow-1: rgba(168, 85, 247, 0.25);
            --bg-glow-2: rgba(99, 102, 241, 0.15);
            --card: rgba(30, 41, 59, 0.55);
            --card-input: rgba(15, 23, 42, 0.55);
            --board-top: #1e40af;
            --board-bot: #1e3a8a;
            --board-highlight: rgba(255, 255, 255, 0.12);
            --hole-top: #0b1229;
            --hole-bot: #040713;
            --hole-shadow: rgba(0, 0, 0, 0.75);
            --red: #ef4444;
            --red-light: #fca5a5;
            --red-glow: rgba(239, 68, 68, 0.55);
            --yellow: #fbbf24;
            --yellow-light: #fde68a;
            --yellow-glow: rgba(251, 191, 36, 0.55);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(148, 163, 184, 0.18);
            --accent: linear-gradient(135deg, #6366f1, #a855f7);
            --surface-strong: rgba(15, 23, 42, 0.72);
            --surface-hover: rgba(255, 255, 255, 0.05);
            --card-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            --board-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
            --board-gloss: rgba(255, 255, 255, 0.12);
            --board-depth: rgba(0, 0, 0, 0.35);
            --hole-highlight: rgba(255, 255, 255, 0.04);
            --focus-ring: rgba(99, 102, 241, 0.25);
            --winner-ring: rgba(255, 255, 255, 0.85);
            --toggle-track: linear-gradient(135deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.78));
            --toggle-thumb: linear-gradient(135deg, #fde68a, #f59e0b);
            --toggle-thumb-shadow: rgba(251, 191, 36, 0.35);
            --toggle-thumb-shift: 20px;
            --lift-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
            --press-shadow: 0 6px 16px rgba(0, 0, 0, 0.28);
            --draw-text: #c7d2fe;
        }

        :root[data-theme="light"] {
            --bg-top: #f8fafc;
            --bg-bottom: #e0e7ff;
            --bg-glow-1: rgba(168, 85, 247, 0.18);
            --bg-glow-2: rgba(99, 102, 241, 0.12);
            --card: rgba(255, 255, 255, 0.75);
            --card-input: rgba(255, 255, 255, 0.85);
            --board-top: #2563eb;
            --board-bot: #1d4ed8;
            --board-highlight: rgba(255, 255, 255, 0.22);
            --hole-top: #eef2ff;
            --hole-bot: #c7d2fe;
            --hole-shadow: rgba(30, 64, 175, 0.45);
            --red-light: #b91c1c;
            --red-glow: rgba(239, 68, 68, 0.32);
            --yellow-light: #92400e;
            --yellow-glow: rgba(251, 191, 36, 0.28);
            --text: #0f172a;
            --text-dim: #475569;
            --border: rgba(15, 23, 42, 0.12);
            --surface-strong: rgba(255, 255, 255, 0.92);
            --surface-hover: rgba(255, 255, 255, 0.16);
            --card-shadow: 0 18px 40px rgba(37, 99, 235, 0.16);
            --board-shadow: 0 24px 52px rgba(37, 99, 235, 0.26);
            --board-gloss: rgba(255, 255, 255, 0.28);
            --board-depth: rgba(37, 99, 235, 0.18);
            --hole-highlight: rgba(255, 255, 255, 0.32);
            --focus-ring: rgba(37, 99, 235, 0.18);
            --winner-ring: rgba(30, 64, 175, 0.72);
            --toggle-track: linear-gradient(135deg, rgba(191, 219, 254, 0.98), rgba(224, 231, 255, 0.96));
            --toggle-thumb: linear-gradient(135deg, #ffffff, #dbeafe);
            --toggle-thumb-shadow: rgba(37, 99, 235, 0.22);
            --toggle-thumb-shift: 0px;
            --lift-shadow: 0 14px 30px rgba(37, 99, 235, 0.16);
            --press-shadow: 0 6px 16px rgba(37, 99, 235, 0.14);
            --draw-text: #4338ca;
        }

        :root[data-theme="dark"] { color-scheme: dark; }
        :root[data-theme="light"] { color-scheme: light; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100vh;
            background:
                radial-gradient(1200px 600px at 50% -200px, var(--bg-glow-1), transparent 60%),
                radial-gradient(900px 500px at 100% 10%, var(--bg-glow-2), transparent 60%),
                linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 45%);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.3s ease;
        }

        .card,
        .status-pill,
        .score,
        .control select,
        .btn,
        .theme-toggle,
        .cell {
            transition:
                background 0.3s ease,
                color 0.25s ease,
                border-color 0.3s ease,
                box-shadow 0.3s ease;
        }

        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 16px 48px;
        }

        .app {
            width: 100%;
            max-width: 820px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: start;
            gap: 16px;
            padding: 8px 0 4px;
        }

        .header-spacer {
            min-height: 1px;
        }

        .header-titles {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .title {
            font-size: clamp(28px, 5vw, 44px);
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #ef4444 0%, #fbbf24 45%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-top: 6px;
            font-weight: 500;
        }

        .theme-toggle {
            justify-self: end;
            appearance: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 8px 14px 8px 8px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--card);
            backdrop-filter: blur(14px) saturate(140%);
            -webkit-backdrop-filter: blur(14px) saturate(140%);
            color: var(--text);
            cursor: pointer;
            box-shadow: var(--press-shadow);
            transition:
                transform 0.18s ease,
                background 0.3s ease,
                color 0.25s ease,
                border-color 0.3s ease,
                box-shadow 0.18s ease;
        }

        .theme-toggle:hover {
            transform: translateY(-1px);
            box-shadow: var(--lift-shadow);
        }

        .theme-toggle:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px var(--focus-ring), var(--lift-shadow);
        }

        .theme-toggle-track {
            width: 48px;
            height: 28px;
            flex: none;
            position: relative;
            border-radius: 999px;
            background: var(--toggle-track);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .theme-toggle-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--toggle-thumb);
            box-shadow: 0 8px 18px var(--toggle-thumb-shadow);
            transform: translateX(var(--toggle-thumb-shift));
            transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), background 0.25s ease, box-shadow 0.25s ease;
        }

        .theme-toggle-copy {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.05;
        }

        .theme-toggle-label {
            color: var(--text-dim);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .theme-toggle-value {
            font-size: 13px;
            font-weight: 700;
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(14px) saturate(140%);
            -webkit-backdrop-filter: blur(14px) saturate(140%);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--card-shadow);
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 14px;
            background: var(--card-input);
            border: 1px solid var(--border);
        }

        .status-pill .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 10px currentColor;
        }

        .score-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .score {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 12px;
            background: var(--surface-strong);
            border: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
        }

        .score .dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }

        .dot.red, .piece.red { color: var(--red); }
        .dot.yellow, .piece.yellow { color: var(--yellow); }

        .board-container {
            --cols: 7;
            --rows: 6;
            --gap: clamp(4px, 1vw, 8px);
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: var(--gap);
            align-items: center;
        }

        .indicator-row {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(var(--cols), 1fr);
            gap: var(--gap);
            padding: 0 var(--gap);
        }

        .indicator-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .indicator-piece {
            width: 72%;
            height: 72%;
            border-radius: 50%;
            opacity: 0;
            transform: translateY(2px);
            transition: opacity 0.15s ease-out, transform 0.15s ease-out;
        }

        .indicator-piece.visible {
            opacity: 0.45;
            transform: translateY(0);
        }

        .board {
            width: 100%;
            background: linear-gradient(180deg, var(--board-top), var(--board-bot));
            border-radius: 18px;
            padding: var(--gap);
            display: grid;
            grid-template-columns: repeat(var(--cols), 1fr);
            gap: var(--gap);
            box-shadow:
                var(--board-shadow),
                inset 0 2px 8px var(--board-gloss),
                inset 0 -2px 6px var(--board-depth);
            position: relative;
            overflow: hidden;
        }

        .board::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% -10%, var(--board-highlight), transparent 50%);
            pointer-events: none;
        }

        .col {
            display: grid;
            grid-template-rows: repeat(var(--rows), 1fr);
            gap: var(--gap);
            cursor: pointer;
            position: relative;
            transition: background 0.15s;
            border-radius: 10px;
        }

        .col:hover:not(.disabled) { background: var(--surface-hover); }
        .col.disabled { cursor: not-allowed; }

        .cell {
            aspect-ratio: 1;
            background: radial-gradient(circle at 30% 25%, var(--hole-top), var(--hole-bot) 85%);
            border-radius: 50%;
            position: relative;
            box-shadow:
                inset 0 5px 10px var(--hole-shadow),
                inset 0 -2px 4px var(--hole-highlight);
            overflow: hidden;
        }

        .piece {
            position: absolute;
            inset: 6%;
            border-radius: 50%;
            will-change: transform;
        }

        .piece.red {
            background: radial-gradient(circle at 32% 28%, #fecaca, var(--red) 55%, #b91c1c 100%);
            box-shadow:
                0 0 24px var(--red-glow),
                inset 0 4px 10px rgba(255, 255, 255, 0.35),
                inset 0 -6px 12px rgba(0, 0, 0, 0.35);
        }

        .piece.yellow {
            background: radial-gradient(circle at 32% 28%, #fef3c7, var(--yellow) 55%, #b45309 100%);
            box-shadow:
                0 0 24px var(--yellow-glow),
                inset 0 4px 10px rgba(255, 255, 255, 0.35),
                inset 0 -6px 12px rgba(0, 0, 0, 0.35);
        }

        .piece.animated {
            animation: drop 0.55s cubic-bezier(0.5, 0.02, 0.55, 1.2);
        }

        .piece.winner::after {
            content: '';
            position: absolute;
            inset: -6%;
            border-radius: 50%;
            border: 3px solid var(--winner-ring);
            animation: pulseRing 1.4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes drop {
            0% { transform: translateY(calc(-1 * var(--drop-height, 100%))); }
            70% { transform: translateY(0); }
            82% { transform: translateY(-4%); }
            100% { transform: translateY(0); }
        }

        @keyframes pulseRing {
            0%, 100% { transform: scale(1); opacity: 0.85; }
            50% { transform: scale(1.12); opacity: 0.35; }
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            align-items: end;
        }

        .control { display: flex; flex-direction: column; gap: 6px; }

        .control label,
        .control .ctrl-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
        }

        .select-wrap { position: relative; }

        .select-wrap::after {
            content: '';
            position: absolute;
            right: 14px;
            top: 50%;
            width: 8px;
            height: 8px;
            border-right: 2px solid var(--text-dim);
            border-bottom: 2px solid var(--text-dim);
            transform: translateY(-70%) rotate(45deg);
            pointer-events: none;
        }

        .control select {
            appearance: none;
            -webkit-appearance: none;
            width: 100%;
            background: var(--surface-strong);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 36px 12px 14px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            font-weight: 500;
            transition: border-color 0.15s, box-shadow 0.15s;
            cursor: pointer;
        }

        .control select:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            appearance: none;
            border: none;
            padding: 11px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.08s, box-shadow 0.18s, background 0.2s, opacity 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover { transform: translateY(-1px); box-shadow: var(--lift-shadow); }
        .btn:active { transform: translateY(0); box-shadow: var(--press-shadow); }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
        }

        .btn-secondary {
            background: var(--surface-strong);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .toast {
            padding: 14px 20px;
            border-radius: 14px;
            font-weight: 600;
            text-align: center;
            font-size: 15px;
            animation: slideIn 0.45s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-12px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .toast.win-red {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.18), rgba(239, 68, 68, 0.04));
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: var(--red-light);
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.15);
        }

        .toast.win-yellow {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.18), rgba(251, 191, 36, 0.04));
            border: 1px solid rgba(251, 191, 36, 0.35);
            color: var(--yellow-light);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.15);
        }

        .toast.draw {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.18), rgba(99, 102, 241, 0.04));
            border: 1px solid rgba(99, 102, 241, 0.35);
            color: var(--draw-text);
        }

        :root[data-theme="light"] .toast.win-red {
            background: linear-gradient(135deg, rgba(254, 226, 226, 0.94), rgba(255, 241, 242, 0.84));
            border-color: rgba(220, 38, 38, 0.18);
            color: #991b1b;
            box-shadow: 0 16px 34px rgba(239, 68, 68, 0.12);
        }

        :root[data-theme="light"] .toast.win-yellow {
            background: linear-gradient(135deg, rgba(254, 249, 195, 0.96), rgba(255, 251, 235, 0.88));
            border-color: rgba(245, 158, 11, 0.18);
            color: #92400e;
            box-shadow: 0 16px 34px rgba(245, 158, 11, 0.12);
        }

        .footer {
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
            margin-top: 8px;
        }

        @media (max-width: 560px) {
            #root { padding: 18px 10px 36px; }
            .header { grid-template-columns: 1fr; justify-items: center; gap: 12px; }
            .header-spacer { display: none; }
            .card { padding: 14px; border-radius: 16px; }
            .controls { grid-template-columns: 1fr; }
            .theme-toggle { justify-self: center; width: min(100%, 220px); }
            .status-pill { padding: 8px 14px; font-size: 13px; }
            .btn { padding: 10px 16px; font-size: 13px; }
            .score { padding: 6px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="connect-four.js"></script>
</body>
</html>
